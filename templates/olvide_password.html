<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña — AnsioTest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="container narrow">
  <header>
    <h1>Ansio<span>Test</span></h1>
    <p>Recupera el acceso a tu cuenta.</p>
  </header>

  <div class="section-card center-card">
    <div class="section-label">Recuperar contraseña</div>

    {% if mensaje %}
      <p style="text-align:center; margin: 12px 0;">{{ mensaje }}</p>
      <div class="footer-link" style="margin-top:8px;">
        <a href="/login">Volver a iniciar sesión</a>
      </div>
    {% else %}
      <p style="text-align:center; margin: 0 0 12px; color: var(--muted); font-size:0.85rem;">
        Ingresa tu correo y te mandamos un link para restablecer tu contraseña.
      </p>
      <form action="/olvide-password" method="POST" class="name-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="email">Correo</label>
          <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required autofocus />
        </div>
        <button type="submit" class="submit-btn">Enviar link →</button>
      </form>
    {% endif %}
  </div>

  <div class="footer-link">
    <a href="/login">← Volver a iniciar sesión</a>
  </div>
</div>
</body>
</html>
