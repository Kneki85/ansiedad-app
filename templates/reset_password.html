<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nueva contraseña — AnsioTest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<div class="container narrow">
  <header>
    <h1>Ansio<span>Test</span></h1>
    <p>Elige tu nueva contraseña.</p>
  </header>

  <div class="section-card center-card">
    <div class="section-label">Nueva contraseña</div>

    {% if not token_valido %}
      <p style="text-align:center; margin: 12px 0;">
        Este enlace ya no es válido o expiró. Pide uno nuevo.
      </p>
      <div class="footer-link" style="margin-top:8px;">
        <a href="/olvide-password">Pedir un nuevo link</a>
      </div>
    {% else %}
      <form method="POST" class="name-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="field">
          <label for="password">Nueva contraseña</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        <div class="field">
          <label for="confirmar">Confirmar contraseña</label>
          <input type="password" id="confirmar" name="confirmar" placeholder="••••••••" required />
        </div>
        {% if error %}
        <div class="error-msg" style="display:block;">{{ error }}</div>
        {% endif %}
        <button type="submit" class="submit-btn">Guardar contraseña →</button>
      </form>
    {% endif %}
  </div>

  <div class="footer-link">
    <a href="/login">← Volver a iniciar sesión</a>
  </div>
</div>
</body>
</html>
